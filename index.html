<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Expense Tracker</h1>

<form id="expenseForm">
  <label>Amount
    <input type="number" step="0.01" id="amount" required />
  </label>

  <label>Category
    <select id="category" required>
    </select>
  </label>

  <label>Subcategory
    <select id="subcategory" required>
    </select>
  </label>

  <button id="saveExpenseBtn" type="submit">Save Expense</button>
  <button id="exportToExcelBtn" type="button" onclick="exportToExcel()">Export month to Excel file</button>
  <button id="signInBtn" type="button" onclick="signInWithGoogle()">Sign in with Google</button>
</form>

<div class="message" id="message"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase-config.js"></script>
<script src="utils.js"></script>
<script type="module" src="app.js"></script>

<script type="module">
  import { loadCategoriesAndSubcategories } from './loadCategories.js';
  loadCategoriesAndSubcategories('category', 'subcategory');
</script>

</body>
</html>
