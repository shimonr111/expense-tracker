<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <link rel="apple-touch-icon" href="./images/apple-icon.png">
</head>
<body>

<h1>Expense Tracker</h1>

<form id="expenseForm">
  <label>Amount
    <input type="number" step="0.01" id="amount" required />
  </label>

  <label>Category
    <select id="category" required>
    </select>
  </label>

  <label>Subcategory
    <select id="subcategory" required>
    </select>
  </label>

  <button id="saveExpenseBtn" type="submit">Save Expense</button>
  <button id="exportToExcelBtn" type="button">Export month to Excel file</button>
  <button id="signInBtn" type="button" onclick="signInWithGoogle()" disabled>Sign in with Google</button>
</form>

<div class="message" id="message"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="./js/firebase-config.js"></script>
<script src="./js/helpFunctions.js"></script>
<script type="module" src="./js/saveExpenseLogic.js"></script>
<script type="module" src="./js/exportToExcel.js"></script>
<script type="module">
  import { loadCategoriesAndSubcategories } from './js/loadCategories.js';
  loadCategoriesAndSubcategories('category', 'subcategory');
</script>

<div id="version-label">
    Version 1.0.5
  </div>

</body>
</html>
